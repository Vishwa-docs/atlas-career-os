# Render blueprint — a SINGLE free web service.
#
# Postgres lives on Neon (set DATABASE_URL). We intentionally do NOT provision
# Render Redis or a worker: Render's Key-Value (Redis) is paid-only, and the API
# needs neither — WebSocket notifications use an in-process manager, and the
# background jobs (digests / re-embedding) are non-essential for the hosted demo.
# This keeps the deploy on Render's free tier (no payment method required).
# Frontend is on Vercel.
services:
  - type: web
    name: atlas-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false # Neon async URL: postgresql+asyncpg://USER:PASS@HOST/neondb (no query string)
      - key: DB_REQUIRE_SSL
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: USE_MOCK_LLM
        value: "false"
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o-2
      - key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
        value: text-embedding-3-large
      - key: AZURE_OPENAI_API_VERSION
        value: "2024-12-01-preview"
      # Embeddings stay deterministic (match the seeded corpus; demo Azure resource
      # has no embeddings deployment).
      - key: USE_AZURE_EMBEDDINGS
        value: "false"
      - key: CORS_ORIGINS
        sync: false # your Vercel URL, e.g. https://frontend-bay-two-7untyz4smg.vercel.app
    # Schema is idempotent; the DB is already seeded, so seed --if-empty is a no-op.
    preDeployCommand: "python -m app.scripts.init_db && python -m app.scripts.seed --if-empty"
