# Render blueprint for the Atlas backend (API + ARQ worker + Redis).
# The Postgres lives on Neon (set DATABASE_URL). Frontend is on Vercel.
services:
  - type: web
    name: atlas-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false # set to your Neon connection string (postgresql+asyncpg://...)
      - key: DB_REQUIRE_SSL
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: USE_MOCK_LLM
        value: "false"
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o-2
      - key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
        value: text-embedding-3-large
      - key: AZURE_OPENAI_API_VERSION
        value: "2024-12-01-preview"
      # Embeddings stay on the deterministic embedder (matches the seeded corpus;
      # the demo Azure resource has no embeddings deployment).
      - key: USE_AZURE_EMBEDDINGS
        value: "false"
      - key: REDIS_URL
        fromService:
          name: atlas-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://frontend-bay-two-7untyz4smg.vercel.app
    # Create schema + seed demo data on first deploy (seed is idempotent).
    preDeployCommand: "python -m app.scripts.init_db && python -m app.scripts.seed --if-empty"

  - type: worker
    name: atlas-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: arq app.workers.arq_settings.WorkerSettings
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_REQUIRE_SSL
        value: "true"
      # Worker only does deterministic re-embedding — no Azure key needed.
      - key: USE_MOCK_LLM
        value: "true"
      - key: REDIS_URL
        fromService:
          name: atlas-redis
          type: redis
          property: connectionString

  - type: redis
    name: atlas-redis
    ipAllowList: []
    plan: free
